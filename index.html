<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHZ_Q Sovereign Gate</title>
    <style>
        :root {
            --bg:       #020b18;
            --surface:  #040f1e;
            --border:   #1e3a5f;
            --green:    #4ade80;
            --red:      #f87171;
            --blue:     #38bdf8;
            --muted:    #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            padding: 2rem;
            min-height: 100dvh;
        }
        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        header h1 { font-size: 1.1rem; letter-spacing: 0.05em; }
        #status { color: var(--muted); font-size: 0.85rem; margin-top: 0.4rem; }
        .log-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 320px;
            white-space: pre-wrap;
            font-size: 0.82rem;
            line-height: 1.7;
            overflow-y: auto;
        }
        .accepted { color: var(--green); font-weight: bold; }
        .rejected { color: var(--red);   font-weight: bold; }
        .info     { color: var(--blue); }
        .dim      { color: var(--muted); }
        button {
            margin-top: 1.5rem;
            background: var(--surface);
            color: var(--green);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem 1.4rem;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
        }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>
    <header>
        <h1>&#x1F7E2; KHZ_Q SOVEREIGN GATE &mdash; EDGE ACTIVE</h1>
        <div id="status">Initializing WebAssembly Ethical Prism&hellip;</div>
    </header>

    <div class="log-box" id="log"></div>
    <button id="testBtn" style="display:none" onclick="runSmokeTest()">&#x26A1; Run Smoke Test</button>

    <script>
    const logEl    = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const testBtn  = document.getElementById('testBtn');

    const log = (html) => { logEl.innerHTML += html + '\n'; };

    let wasmExports = null;
    let wasmMemory  = null;

    /* ── Load khzq_prism.wasm ────────────────────────────────────────── */
    WebAssembly.instantiateStreaming(fetch('khzq_prism.wasm'), { env: {} })
        .then(result => {
            wasmExports = result.instance.exports;
            wasmMemory  = wasmExports.memory.buffer;

            statusEl.innerHTML =
                "<span class='info'>[+] SVD Ethical Prism loaded &mdash; " +
                "Zero Telemetry &mdash; Local Silicon Only</span>";

            testBtn.style.display = 'inline-block';
            log("<span class='info'>Wasm module instantiated. Exports ready.</span>");
            log("<span class='dim'>Call window.verifyLLMOutput(Float32Array[64]) to run prism.</span>");
        })
        .catch(err => {
            statusEl.innerHTML = "<span class='rejected'>[-] Wasm load failed: " + err.message + "</span>";
            log("<span class='rejected'>ERROR: " + err.message + "</span>");
            log("<span class='dim'>Make sure khzq_prism.wasm is in the same directory as index.html.</span>");
        });

    /* ── JS Bridge ───────────────────────────────────────────────────── */
    /*
     * window.verifyLLMOutput(matrix_flat)
     *
     * matrix_flat : Float32Array(64)  — row-major 8x8 tensor from LLM
     * returns     : { energy, penalty, chi_e, coherent }
     */
    window.verifyLLMOutput = function(matrix_flat) {
        if (!wasmExports) {
            console.error('[KHZ_Q] Wasm not loaded yet.');
            return null;
        }
        if (matrix_flat.length !== 64) {
            console.error('[KHZ_Q] Expected Float32Array(64), got length ' + matrix_flat.length);
            return null;
        }

        log('--------------------------------------------------');
        log("<span class='dim'>&#x2699;&#xFE0F;  Intercepting LLM reasoning trace&hellip;</span>");

        /* 1. Write 64 floats into Wasm linear memory at khzq_input_matrix */
        const inputOffset = wasmExports.khzq_input_matrix.value;
        const inputView   = new Float32Array(wasmMemory, inputOffset, 64);
        inputView.set(matrix_flat);

        /* 2. Execute SVD Ethical Prism in C11 Wasm */
        wasmExports.khz_q_verify_output_wasm(0.889);

        /* 3. Read scalar outputs from Wasm linear memory */
        const energy    = new Float32Array(wasmMemory,
                              wasmExports.khzq_output_energy.value,   1)[0];
        const penalty   = new Float32Array(wasmMemory,
                              wasmExports.khzq_output_penalty.value,  1)[0];
        const chi_e     = new Int32Array(wasmMemory,
                              wasmExports.khzq_output_chi_e.value,    1)[0];
        const coherent  = new Int32Array(wasmMemory,
                              wasmExports.khzq_output_coherent.value, 1)[0] === 1;

        /* 4. Log results */
        log(`<span class='dim'>&#x26A1; Energy Preserved : ${(energy * 100).toFixed(2)}%</span>`);
        log(`<span class='dim'>&#x2696;&#xFE0F; Penalty_Nasl    : ${penalty.toFixed(4)}</span>`);
        log(`<span class='dim'>&#x1F4CA; chi_E Rank       : ${chi_e} / 8</span>`);

        if (coherent) {
            log("<span class='accepted'>&#x2705; ACCEPTED &mdash; Fitrah-Aligned Subspace</span>");
        } else {
            log("<span class='rejected'>&#x274C; REJECTED &mdash; Maqasid Violation / Destructive Interference</span>");
        }

        return { energy, penalty, chi_e, coherent };
    };

    /* ── Smoke test ──────────────────────────────────────────────────── */
    function runSmokeTest() {
        log("<span class='info'>\n=== SMOKE TEST ===</span>");

        /* T1: Identity matrix — should be highly coherent */
        const identity = new Float32Array(64).fill(0);
        for (let i = 0; i < 8; i++) identity[i * 8 + i] = 1.0;
        log("<span class='dim'>T1: Identity matrix (expected ACCEPTED)</span>");
        window.verifyLLMOutput(identity);

        /* T2: Zero matrix — degenerate, should be rejected */
        log("<span class='dim'>T2: Zero matrix (expected REJECTED)</span>");
        window.verifyLLMOutput(new Float32Array(64).fill(0));

        /* T3: Uniform matrix — low rank, high energy in 1 singular value */
        log("<span class='dim'>T3: Uniform matrix (expected ACCEPTED)</span>");
        window.verifyLLMOutput(new Float32Array(64).fill(1.0));
    }
    </script>
</body>
</html>
