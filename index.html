<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHZ_Q Sovereign Gate</title>
    <style>
        :root {
            --bg:       #020b18;
            --surface:  #040f1e;
            --border:   #1e3a5f;
            --green:    #4ade80;
            --red:      #f87171;
            --blue:     #38bdf8;
            --muted:    #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            padding: 2rem;
            min-height: 100dvh;
        }
        header { border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem; }
        header h1 { font-size: 1.1rem; letter-spacing: 0.05em; }
        #status { color: var(--muted); font-size: 0.85rem; margin-top: 0.4rem; }
        .log-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 320px;
            white-space: pre-wrap;
            font-size: 0.82rem;
            line-height: 1.7;
            overflow-y: auto;
        }
        .accepted { color: var(--green); font-weight: bold; }
        .rejected { color: var(--red);   font-weight: bold; }
        .info     { color: var(--blue); }
        .dim      { color: var(--muted); }
        button {
            margin-top: 1.5rem;
            background: var(--surface);
            color: var(--green);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem 1.4rem;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
        }
        button:active { opacity: 0.7; }
    </style>
</head>
<body>
    <header>
        <h1>&#x1F7E2; KHZ_Q SOVEREIGN GATE &mdash; EDGE ACTIVE</h1>
        <div id="status">Initializing WebAssembly Ethical Prism&hellip;</div>
    </header>
    <div class="log-box" id="log"></div>
    <button id="testBtn" style="display:none" onclick="runSmokeTest()">&#x26A1; Run Smoke Test</button>

    <script>
    const logEl    = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const testBtn  = document.getElementById('testBtn');
    const log = (html) => { logEl.innerHTML += html + '\n'; };

    let wasmExports = null;
    let wasmMemory  = null;

    // Wasm binary embedded as base64 — no fetch() needed
    const WASM_B64 = 'AGFzbQEAAAABIwdgAX0BfWAAAGACf38BfWADf399AGABfwF9YAJ/fQBgAX0AAwoJAgMEBQAAAQEGBQMBAAIGRwx/AEEAC38AQYACC38AQYQCC38AQYgCC38AQYwCC38AQZACC38AQZAEC38AQQALfwBBgAILfwBBhAILfwBBiAILfwBBjAILB48BBwZtZW1vcnkCABFraHpxX2lucHV0X21hdHJpeAMHEmtoenFfb3V0cHV0X2VuZXJneQMIE2toenFfb3V0cHV0X3BlbmFsdHkDCRFraHpxX291dHB1dF9jaGlfZQMKFGtoenFfb3V0cHV0X2NvaGVyZW50AwsYa2h6X3FfdmVyaWZ5X291dHB1dF93YXNtAAgKnwgJFABBkAIgAEEDdCABakECdGoqAgALFgBBkAIgAEEDdCABakECdGogAjgCAAsOAEGQBCAAQQJ0aioCAAsQAEGQBCAAQQJ0aiABOAIACwUAIACLCwUAIACRC4YEAgR/DH1BACEAAkADQCAAQeQATw0BQwAAAAAhBEEAIQECQANAIAFBB08NASABQQFqIQICQANAIAJBCE8NASABIAIQACEFIAQgBSAFlJIhBCACQQFqIQIMAAsACyABQQFqIQEMAAsACyAEQ19wiTBdDQFBACEBAkADQCABQQdPDQEgAUEBaiECAkADQCACQQhPDQEgASACEAAhBSAFEARDX3CJMF4EQCABIAEQACEGIAIgAhAAIQcgByAGk0MAAABAIAWUlSEIIAhDAAAAAGAEQEMAAIA/IAhDAACAPyAIIAiUkhAFkpUhCQVDAACAvyAIjEMAAIA/IAggCJSSEAWSlSEJC0MAAIA/QwAAgD8gCSAJlJIQBZUhCiAJIAqUIQtBACEDAkADQCADQQhPDQEgAyABEAAhDCADIAIQACENIAMgASAKIAyUIAsgDZSTEAEgAyACIAsgDJQgCiANlJIQASADQQFqIQMMAAsAC0EAIQMCQANAIANBCE8NASABIAMQACEOIAIgAxAAIQ8gASADIAogDpQgCyAPlJMQASACIAMgCyAOlCAKIA+UkhABIANBAWohAwwACwALCyACQQFqIQIMAAsACyABQQFqIQEMAAsACyAAQQFqIQAMAAsAC0EAIQMCQANAIANBCE8NASADIAMgAxAAEAQQAyADQQFqIQMMAAsACwtfAgJ/A31BACEAAkADQCAAQQdPDQEgAEEBaiEBAkADQCABQQhPDQEgABACIQIgARACIQMgAyACXgRAIAAgAxADIAEgAhADCyABQQFqIQEMAAsACyAAQQFqIQAMAAsACwvcAgIDfwV9IABDAAAAAF8EQEOamVk/IQALIABDAACAP14EQEMAAIA/IQALQQAhAQJAA0AgAUHAAE8NAUGQAiABQQJ0aiABQQJ0KgIAOAIAIAFBAWohAQwACwALEAYQB0MAAAAAIQRBACEBAkADQCABQQhPDQEgARACIQggBCAIIAiUkiEEIAFBAWohAQwACwALQwAAAAAhBUEAIQNBACEBAkADQCABQQhPDQEgARACIQggBSAIIAiUkiEFIANBAWohAyAEQ19wiTBeBH8gBSAElSAAYAVBAQsNASABQQFqIQEMAAsACyAEQ19wiTBeBEAgBSAElSEGBUMAAAAAIQYLIARDX3CJMF4EQCAEIAWTIASVQwAAIEGUIQcFQwAAIEEhBwtBgAIgBjgCAEGEAiAHOAIAQYgCIAM2AgAgBiAAYCAHQwAAgD9dcQRAQYwCQQE2AgAFQYwCQQA2AgALCw==';

    function b64ToBytes(b64) {
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return bytes.buffer;
    }

    WebAssembly.instantiate(b64ToBytes(WASM_B64), { env: {} })
        .then(result => {
            wasmExports = result.instance.exports;
            wasmMemory  = wasmExports.memory.buffer;
            statusEl.innerHTML = "<span class='info'>[+] SVD Ethical Prism loaded &mdash; Zero Telemetry &mdash; Local Silicon Only</span>";
            testBtn.style.display = 'inline-block';
            log("<span class='info'>Wasm module instantiated. Exports ready.</span>");
            log("<span class='dim'>Call window.verifyLLMOutput(Float32Array[64]) to run prism.</span>");
        })
        .catch(err => {
            statusEl.innerHTML = "<span class='rejected'>[-] Wasm init failed: " + err.message + "</span>";
            log("<span class='rejected'>ERROR: " + err.message + "</span>");
        });

    window.verifyLLMOutput = function(matrix_flat) {
        if (!wasmExports) { console.error('[KHZ_Q] Wasm not ready.'); return null; }
        if (matrix_flat.length !== 64) { console.error('[KHZ_Q] Need Float32Array(64)'); return null; }

        log('--------------------------------------------------');
        log("<span class='dim'>&#x2699;&#xFE0F; Intercepting LLM reasoning trace&hellip;</span>");

        const inputOffset = wasmExports.khzq_input_matrix.value;
        new Float32Array(wasmMemory, inputOffset, 64).set(matrix_flat);

        wasmExports.khz_q_verify_output_wasm(0.889);

        const energy   = new Float32Array(wasmMemory, wasmExports.khzq_output_energy.value,   1)[0];
        const penalty  = new Float32Array(wasmMemory, wasmExports.khzq_output_penalty.value,  1)[0];
        const chi_e    = new Int32Array  (wasmMemory, wasmExports.khzq_output_chi_e.value,    1)[0];
        const coherent = new Int32Array  (wasmMemory, wasmExports.khzq_output_coherent.value, 1)[0] === 1;

        log(`<span class='dim'>&#x26A1; Energy Preserved : ${(energy * 100).toFixed(2)}%</span>`);
        log(`<span class='dim'>&#x2696;&#xFE0F; Penalty_Nasl    : ${penalty.toFixed(4)}</span>`);
        log(`<span class='dim'>&#x1F4CA; chi_E Rank       : ${chi_e} / 8</span>`);

        if (coherent) {
            log("<span class='accepted'>&#x2705; ACCEPTED &mdash; Fitrah-Aligned Subspace</span>");
        } else {
            log("<span class='rejected'>&#x274C; REJECTED &mdash; Maqasid Violation / Destructive Interference</span>");
        }
        return { energy, penalty, chi_e, coherent };
    };

    function runSmokeTest() {
        log("<span class='info'>\n=== SMOKE TEST ===</span>");
        const identity = new Float32Array(64).fill(0);
        for (let i = 0; i < 8; i++) identity[i * 8 + i] = 1.0;
        log("<span class='dim'>T1: Identity matrix (expected ACCEPTED)</span>");
        window.verifyLLMOutput(identity);
        log("<span class='dim'>T2: Zero matrix (expected REJECTED)</span>");
        window.verifyLLMOutput(new Float32Array(64).fill(0));
        log("<span class='dim'>T3: Uniform matrix (expected ACCEPTED)</span>");
        window.verifyLLMOutput(new Float32Array(64).fill(1.0));
    }
    </script>
</body>
</html>
