<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KHZ_Q Sovereign Gate</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #020b18; }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px #4ade80, 0 0 20px #4ade8044; }
      50% { box-shadow: 0 0 16px #4ade80, 0 0 40px #4ade8066; }
    }
    @keyframes scan {
      0% { transform: translateY(-100%); opacity: 0.4; }
      100% { transform: translateY(100vh); opacity: 0; }
    }
    .glow-green { text-shadow: 0 0 8px #4ade80, 0 0 20px #4ade8088; }
    .glow-cyan  { text-shadow: 0 0 8px #38bdf8, 0 0 20px #38bdf888; }
    .border-glow-green { animation: pulse-glow 2.4s ease-in-out infinite; }
    .scanline {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px; background: linear-gradient(90deg, transparent, #38bdf844, transparent);
      animation: scan 5s linear infinite; pointer-events: none; z-index: 9999;
    }
    .grid-pattern {
      background-image:
        linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>
<body class="min-h-screen grid-pattern">
  <div class="scanline"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    // ── Mock 8×8 ethical-relationship matrix ──────────────────────────────────
    const MOCK_MATRIX = [
      [9.2, 0.3, 0.1, 0.4, 0.2, 0.1, 0.3, 0.2],
      [0.3, 8.7, 0.4, 0.2, 0.1, 0.3, 0.2, 0.1],
      [0.1, 0.4, 8.5, 0.3, 0.4, 0.2, 0.1, 0.3],
      [0.4, 0.2, 0.3, 9.0, 0.2, 0.1, 0.4, 0.2],
      [0.2, 0.1, 0.4, 0.2, 7.8, 0.5, 0.3, 0.4],
      [0.1, 0.3, 0.2, 0.1, 0.5, 8.1, 0.2, 0.3],
      [0.3, 0.2, 0.1, 0.4, 0.3, 0.2, 8.9, 0.1],
      [0.2, 0.1, 0.3, 0.2, 0.4, 0.3, 0.1, 7.5],
    ];

    const CHI_E = 5; // ethical rank

    // ── SVD + Fitrah projection ───────────────────────────────────────────────
    function calculateSVD_Fitrah(matrix) {
      const svdResult = numeric.svd(matrix);
      const { U, S, V } = svdResult;
      const n = S.length;

      const totalEnergy = S.reduce((acc, s) => acc + s * s, 0);
      const topEnergy   = S.slice(0, CHI_E).reduce((acc, s) => acc + s * s, 0);
      const energyPct   = (topEnergy / totalEnergy) * 100;

      // Truncate: zero out singular values beyond rank χ_E
      const S_trunc = S.map((s, i) => (i < CHI_E ? s : 0));

      // Reconstruct: A_proj = U * diag(S_trunc) * V^T
      const Vt = numeric.transpose(V);
      const S_diag = numeric.diag(S_trunc);
      const projected = numeric.dot(numeric.dot(U, S_diag), Vt);

      return {
        singularValues: S.slice(0, CHI_E),
        energyPct,
        projected,
      };
    }

    // ── Nasl penalty (off-diagonal disruption) ───────────────────────────────
    function calculateNaslPenalty(proj) {
      let offSum = 0, diagSum = 0;
      for (let i = 0; i < proj.length; i++) {
        for (let j = 0; j < proj[i].length; j++) {
          const v = Math.abs(proj[i][j]);
          if (i === j) diagSum += v;
          else         offSum  += v;
        }
      }
      const ratio = offSum / (diagSum + 1e-9);
      return parseFloat((ratio * 10).toFixed(4)); // scale to 0-10 range
    }

    // ── UI helpers ───────────────────────────────────────────────────────────
    function SingularBar({ value, max, index }) {
      const pct = Math.min((value / max) * 100, 100);
      return (
        <div className="mb-3">
          <div className="flex justify-between text-xs mb-1">
            <span className="text-cyan-400 font-mono">σ<sub>{index + 1}</sub></span>
            <span className="text-green-400 font-mono glow-green">{value.toFixed(4)}</span>
          </div>
          <div className="w-full bg-slate-800 rounded-full h-2">
            <div
              className="h-2 rounded-full"
              style={{
                width: `${pct}%`,
                background: `linear-gradient(90deg, #38bdf8, #4ade80)`,
                boxShadow: `0 0 8px #4ade8066`,
                transition: 'width 0.8s cubic-bezier(0.16,1,0.3,1)',
              }}
            />
          </div>
        </div>
      );
    }

    function StatCard({ label, value, unit, color }) {
      return (
        <div className="rounded-xl border border-slate-700 bg-slate-900/60 p-4 backdrop-blur">
          <p className="text-xs text-slate-400 uppercase tracking-widest mb-1">{label}</p>
          <p className={`text-2xl font-bold font-mono ${color}`}>
            {value}<span className="text-sm ml-1 text-slate-400">{unit}</span>
          </p>
        </div>
      );
    }

    // ── Main dashboard ───────────────────────────────────────────────────────
    function KHZQDashboard() {
      const [result, setResult]     = useState(null);
      const [loading, setLoading]   = useState(false);
      const [analyzed, setAnalyzed] = useState(false);

      const handleAnalyze = useCallback(() => {
        setLoading(true);
        setTimeout(() => {
          const { singularValues, energyPct, projected } = calculateSVD_Fitrah(MOCK_MATRIX);
          const penalty = calculateNaslPenalty(projected);
          const approved = energyPct > 85 && penalty < 1.0;
          setResult({ singularValues, energyPct, penalty, approved });
          setLoading(false);
          setAnalyzed(true);
        }, 600);
      }, []);

      const maxSV = result ? Math.max(...result.singularValues) : 1;

      return (
        <div className="min-h-screen text-white px-4 py-8 max-w-2xl mx-auto">

          {/* ── Header ── */}
          <div className="text-center mb-10">
            <div className="inline-flex items-center gap-2 mb-3">
              <span className="w-3 h-3 rounded-full bg-green-400" style={{boxShadow:'0 0 8px #4ade80'}} />
              <span className="text-xs text-cyan-400 uppercase tracking-widest font-mono">System Online</span>
              <span className="w-3 h-3 rounded-full bg-cyan-400" style={{boxShadow:'0 0 8px #38bdf8'}} />
            </div>
            <h1 className="text-3xl sm:text-4xl font-black uppercase tracking-tight glow-green"
                style={{color:'#4ade80'}}>
              KHZ_Q Sovereign Gate
            </h1>
            <p className="text-cyan-400 text-sm font-mono mt-1 glow-cyan">Cloudflare Edge Filter</p>
            <div className="mt-4 h-px w-full"
                 style={{background:'linear-gradient(90deg,transparent,#38bdf8,transparent)'}} />
          </div>

          {/* ── Matrix info ── */}
          <div className="mb-6 rounded-xl border border-slate-700 bg-slate-900/40 p-4 font-mono text-xs text-slate-400">
            <p className="text-cyan-300 mb-1">▸ Input: 8×8 LLM Ethical Relationship Matrix</p>
            <p>▸ Method: SVD Ethical Prism  |  χ<sub>E</sub> = {CHI_E}</p>
            <p>▸ Principle: Fitrah-Alignment via Rank Truncation</p>
          </div>

          {/* ── CTA button ── */}
          <button
            onClick={handleAnalyze}
            disabled={loading}
            className="w-full py-4 rounded-xl font-bold text-lg uppercase tracking-widest transition-all duration-300 disabled:opacity-50 mb-8"
            style={{
              background: loading ? '#1e293b' : 'linear-gradient(135deg,#065f46,#0e7490)',
              border: '1px solid #4ade80',
              color: '#4ade80',
              boxShadow: loading ? 'none' : '0 0 20px #4ade8033, inset 0 0 20px #4ade8011',
            }}
          >
            {loading ? (
              <span className="flex items-center justify-center gap-2">
                <svg className="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="#4ade80" strokeWidth="4"/>
                  <path className="opacity-75" fill="#4ade80" d="M4 12a8 8 0 018-8v8z"/>
                </svg>
                Processing SVD...
              </span>
            ) : '⚡ Analyze Output (Apply SVD)'}
          </button>

          {/* ── Results ── */}
          {analyzed && result && (
            <div className="space-y-6">

              {/* Stats row */}
              <div className="grid grid-cols-2 gap-3">
                <StatCard
                  label="Energy Preserved"
                  value={result.energyPct.toFixed(2)}
                  unit="%"
                  color="text-green-400"
                />
                <StatCard
                  label="Penalty_Nasl Score"
                  value={result.penalty}
                  unit="/ 10"
                  color={result.penalty < 1.0 ? 'text-green-400' : 'text-red-400'}
                />
              </div>

              {/* Singular values */}
              <div className="rounded-xl border border-slate-700 bg-slate-900/60 p-5">
                <h2 className="text-xs text-cyan-400 uppercase tracking-widest font-mono mb-4">
                  Top {CHI_E} Singular Values (σ)
                </h2>
                {result.singularValues.map((sv, i) => (
                  <SingularBar key={i} value={sv} max={maxSV} index={i} />
                ))}
              </div>

              {/* Verdict */}
              <div
                className="rounded-xl p-5 text-center border-2"
                style={{
                  borderColor: result.approved ? '#4ade80' : '#ef4444',
                  background: result.approved ? '#052e1620' : '#3f0f0f20',
                  boxShadow: result.approved
                    ? '0 0 30px #4ade8033'
                    : '0 0 30px #ef444433',
                }}
              >
                <p className="text-xs uppercase tracking-widest font-mono mb-2"
                   style={{color: result.approved ? '#86efac' : '#fca5a5'}}>
                  Final Verdict
                </p>
                <p
                  className="text-xl sm:text-2xl font-black uppercase tracking-wide"
                  style={{
                    color: result.approved ? '#4ade80' : '#ef4444',
                    textShadow: result.approved
                      ? '0 0 16px #4ade80'
                      : '0 0 16px #ef4444',
                  }}
                >
                  {result.approved
                    ? '✓ Approved: Nasl Coherent'
                    : '✗ Rejected: Destructive Interference'}
                </p>
                <p className="text-xs text-slate-400 font-mono mt-2">
                  Energy {result.energyPct.toFixed(2)}%
                  {result.approved ? ' > 85%' : ' ≤ 85%'}
                  &nbsp;|&nbsp;
                  Penalty {result.penalty}
                  {result.approved ? ' < 1.0' : ' ≥ 1.0'}
                </p>
              </div>

            </div>
          )}

          {/* Footer */}
          <div className="mt-12 text-center">
            <div className="h-px w-full mb-4"
                 style={{background:'linear-gradient(90deg,transparent,#4ade8044,transparent)'}} />
            <p className="text-xs text-slate-600 font-mono">KHZ_Q Sovereign Gate · Fitrah-Aligned AI · Cloudflare Edge</p>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KHZQDashboard />);
  </script>
</body>
</html>
