name: Build KHZ_Q Wasm

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Clang wasm32
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang lld
          clang --version

      - name: Build khzq_prism.wasm
        run: |
          clang --target=wasm32 -O3 -nostdlib \
            -Wl,--no-entry \
            -Wl,--export=khzq_input_matrix \
            -Wl,--export=khzq_output_energy \
            -Wl,--export=khzq_output_penalty \
            -Wl,--export=khzq_output_chi_e \
            -Wl,--export=khzq_output_coherent \
            -Wl,--export=khz_q_verify_output_wasm \
            Core_CPP/khz_q_svd.c -o khzq_prism.wasm
          echo "Size: $(wc -c < khzq_prism.wasm) bytes"

      - name: Commit wasm to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f khzq_prism.wasm
          git diff --staged --quiet && echo 'No changes' || git commit -m "ci: build khzq_prism.wasm" && git push
